<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --x: #e8ff6e;
    --o: #ff6e9c;
    --text: #f0f0f8;
    --muted: #6a6a8a;
    --win-bg: #1a1a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(232,255,110,0.03) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(255,110,156,0.03) 0%, transparent 60%);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 0.25rem;
  }

  h1 span:first-child { color: var(--x); }
  h1 span:last-child { color: var(--o); }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .screen {
    width: 100%;
    max-width: 420px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--o); }

  .btn {
    width: 100%;
    padding: 0.85rem 1.5rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--x); color: #0a0a0f; border-color: var(--x); font-weight: 700; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.secondary { border-color: var(--o); color: var(--o); }
  .btn.secondary:hover { background: rgba(255,110,156,0.1); }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    color: var(--muted);
    font-size: 11px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .room-code {
    font-size: clamp(2rem, 10vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--x);
    text-align: center;
    padding: 1rem 0;
  }

  .waiting-text {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .score-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    align-items: center;
    gap: 1rem;
  }
  .score-player { text-align: center; }
  .score-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .score-num { font-size: 2rem; font-weight: 700; }
  .score-num.x { color: var(--x); }
  .score-num.o { color: var(--o); }
  .score-draw { text-align: center; }
  .score-draw .score-label { font-size: 10px; }
  .score-draw .score-num { font-size: 1.2rem; color: var(--muted); }

  .status {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
  }
  .status.x { color: var(--x); }
  .status.o { color: var(--o); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    aspect-ratio: 1;
  }

  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    aspect-ratio: 1;
  }
  .cell:hover:not(.taken):not(.disabled) { background: #1a1a28; border-color: #3a3a5a; transform: scale(0.97); }
  .cell.x { color: var(--x); cursor: default; }
  .cell.o { color: var(--o); cursor: default; }
  .cell.taken { cursor: default; }
  .cell.disabled { cursor: not-allowed; }
  .cell.win { background: var(--win-bg); border-color: var(--x); box-shadow: inset 0 0 20px rgba(232,255,110,0.08); }
  .cell.win.o { border-color: var(--o); box-shadow: inset 0 0 20px rgba(255,110,156,0.08); }

  .role-badge {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
  .role-badge span { font-weight: 700; }
  .role-badge .rx { color: var(--x); }
  .role-badge .ro { color: var(--o); }

  .error-msg {
    font-size: 12px;
    color: var(--o);
    text-align: center;
    min-height: 18px;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-decoration: underline;
    padding: 0;
  }
  .copy-btn:hover { color: var(--text); }
</style>
</head>
<body>

<h1><span>X</span> vs <span>O</span></h1>
<p class="subtitle">Multiplayer · Real-time</p>

<!-- Lobby -->
<div class="screen active" id="screen-lobby">
  <div class="card">
    <p class="card-title">Start a game</p>
    <button class="btn primary" onclick="createRoom()">Create room</button>
  </div>

  <div class="divider">or</div>

  <div class="card">
    <p class="card-title">Join a game</p>
    <input type="text" id="room-input" placeholder="ENTER CODE" maxlength="6" />
    <br><br>
    <button class="btn secondary" onclick="joinRoom()">Join room</button>
    <p class="error-msg" id="join-error"></p>
  </div>
</div>

<!-- Waiting -->
<div class="screen" id="screen-waiting">
  <div class="card" style="text-align:center;">
    <p class="card-title">Share this code with your friend</p>
    <div class="room-code" id="display-code">------</div>
    <button class="copy-btn" onclick="copyCode()">copy code</button>
    <br><br>
    <p class="waiting-text">Waiting for opponent to join...</p>
  </div>
  <button class="btn" onclick="leaveRoom()">Cancel</button>
</div>

<!-- Game -->
<div class="screen" id="screen-game">
  <div class="score-bar">
    <div class="score-player">
      <div class="score-label">X</div>
      <div class="score-num x" id="score-x">0</div>
    </div>
    <div class="score-draw">
      <div class="score-label">Draw</div>
      <div class="score-num" id="score-d">0</div>
    </div>
    <div class="score-player">
      <div class="score-label">O</div>
      <div class="score-num o" id="score-o">0</div>
    </div>
  </div>

  <p class="status" id="game-status">Waiting...</p>
  <p class="role-badge" id="role-badge"></p>

  <div class="board" id="board"></div>

  <button class="btn" id="reset-btn" onclick="resetGame()" style="display:none;">Play again</button>
  <button class="btn" onclick="leaveRoom()">Leave room</button>
</div>

<script>
  let ws, myRole, currentBoard, currentTurn, gameOver = false, myRoomId;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);
    ws.onmessage = (e) => handle(JSON.parse(e.data));
    ws.onclose = () => {
      if (document.getElementById('screen-game').classList.contains('active')) {
        setStatus('Connection lost. Refresh to reconnect.', '');
      }
    };
  }

  function handle(msg) {
    if (msg.type === 'created') {
      myRole = msg.role;
      myRoomId = msg.roomId;
      document.getElementById('display-code').textContent = msg.roomId;
      showScreen('waiting');
    }
    else if (msg.type === 'joined') {
      myRole = msg.role;
      myRoomId = msg.roomId;
      currentBoard = msg.board;
      currentTurn = msg.turn;
      updateScores(msg.scores);
      showScreen('game');
      renderBoard();
      updateStatus();
    }
    else if (msg.type === 'opponent_joined') {
      currentBoard = msg.board;
      currentTurn = msg.turn;
      updateScores(msg.scores);
      showScreen('game');
      renderBoard();
      updateStatus();
    }
    else if (msg.type === 'update') {
      currentBoard = msg.board;
      currentTurn = msg.turn;
      updateScores(msg.scores);
      if (msg.winner) {
        gameOver = true;
        renderBoard(msg.winner === 'X' ? [0,1,2] : null, msg.board, msg.winner);
        setStatus(msg.winner === myRole ? 'You win!' : 'You lose!', msg.winner.toLowerCase());
        document.getElementById('reset-btn').style.display = 'block';
      } else if (msg.draw) {
        gameOver = true;
        renderBoard(null, msg.board, null);
        setStatus("It's a draw!", '');
        document.getElementById('reset-btn').style.display = 'block';
      } else {
        gameOver = false;
        renderBoard();
        updateStatus();
        document.getElementById('reset-btn').style.display = 'none';
      }
    }
    else if (msg.type === 'reset') {
      currentBoard = msg.board;
      currentTurn = msg.turn;
      gameOver = false;
      updateScores(msg.scores);
      renderBoard();
      updateStatus();
      document.getElementById('reset-btn').style.display = 'none';
    }
    else if (msg.type === 'opponent_left') {
      setStatus('Opponent left the game.', '');
      gameOver = true;
    }
    else if (msg.type === 'error') {
      document.getElementById('join-error').textContent = msg.msg;
    }
  }

  function renderBoard(winCells, board, winner) {
    const b = board || currentBoard;
    const el = document.getElementById('board');
    el.innerHTML = '';
    b.forEach((val, i) => {
      const cell = document.createElement('div');
      let cls = 'cell';
      if (val) cls += ' taken ' + val.toLowerCase();
      if (!val && !gameOver && currentTurn === myRole) cls += '';
      else if (!val) cls += ' disabled';
      if (winCells && winCells.includes(i)) cls += ' win ' + (winner || '').toLowerCase();
      cell.className = cls;
      cell.textContent = val || '';
      if (!val && !gameOver && currentTurn === myRole) {
        cell.onclick = () => sendMove(i);
      }
      el.appendChild(cell);
    });
  }

  function sendMove(i) {
    if (gameOver || currentTurn !== myRole) return;
    ws.send(JSON.stringify({ type: 'move', index: i }));
  }

  function updateStatus() {
    const myTurn = currentTurn === myRole;
    setStatus(myTurn ? 'Your turn' : "Opponent's turn", myTurn ? myRole.toLowerCase() : '');
  }

  function setStatus(text, cls) {
    const el = document.getElementById('game-status');
    el.textContent = text;
    el.className = 'status ' + cls;
  }

  function updateScores(s) {
    document.getElementById('score-x').textContent = s.X;
    document.getElementById('score-o').textContent = s.O;
    document.getElementById('score-d').textContent = s.D;
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    if (name === 'game') {
      const badge = document.getElementById('role-badge');
      badge.innerHTML = `You are <span class="r${myRole.toLowerCase()}">${myRole}</span>`;
    }
  }

  function createRoom() {
    connect();
    ws.onopen = () => ws.send(JSON.stringify({ type: 'create' }));
  }

  function joinRoom() {
    const code = document.getElementById('room-input').value.trim().toUpperCase();
    if (!code) return;
    document.getElementById('join-error').textContent = '';
    connect();
    ws.onopen = () => ws.send(JSON.stringify({ type: 'join', roomId: code }));
  }

  function resetGame() {
    ws.send(JSON.stringify({ type: 'reset' }));
  }

  function leaveRoom() {
    if (ws) ws.close();
    showScreen('lobby');
    document.getElementById('room-input').value = '';
    document.getElementById('join-error').textContent = '';
  }

  function copyCode() {
    navigator.clipboard.writeText(myRoomId).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy code', 2000);
    });
  }

  document.getElementById('room-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
</script>
</body>
</html>
